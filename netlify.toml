# Netlify Configuration for TIME Platform
# Otimizado para Next.js 15 com cache agressivo e segurança

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Otimizações de build
  NETLIFY_NEXT_PLUGIN_SKIP_VALIDATION = "true"
  NETLIFY_BUILD_DEBUG = "true"
  # Variáveis de ambiente para otimização
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_OPTIONS = "--max-old-space-size=4096"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ============================================
# REDIRECTS
# ============================================

# Serve assets estáticos diretamente (bypass middleware)
[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

# API routes não devem ser cacheadas
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# ============================================
# HEADERS - SEGURANÇA
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Segurança
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    
    # Cache para páginas dinâmicas (ISR-friendly)
    Cache-Control = "public, max-age=0, must-revalidate"
    
    # HSTS (descomentar quando tiver HTTPS configurado)
    # Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ============================================
# HEADERS - CACHE ESTÁTICO AGRESSIVO
# ============================================

# Assets do Next.js (JS/CSS com hash) - Cache 1 ano
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept-Encoding"

# Imagens otimizadas - Cache 30 dias
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
    Vary = "Accept, Accept-Encoding"

# Imagens WebP/Avif estáticas - Cache 30 dias
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    Vary = "Accept-Encoding"

[[headers]]
  for = "*.avif"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    Vary = "Accept-Encoding"

# Fontes - Cache 1 ano
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept-Encoding"

# Arquivos estáticos públicos - Cache 7 dias
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Manifest e favicon - Cache curto (1 dia)
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================
# HEADERS - API (NO CACHE)
# ============================================

# API routes nunca devem ser cacheadas
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Streaming routes (chat, etc)
[[headers]]
  for = "/api/chat"
  [headers.values]
    Cache-Control = "no-store"
    X-Accel-Buffering = "no"

# ============================================
# COMPRESSÃO
# ============================================

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "production" }
