[build]
  # CORREÇÃO DEFINITIVA: Limpa o .next/ inteiro antes de cada build
  # O Netlify restaura o .next/ completo antes do build rodar — incluindo
  # .next/server/app/ com HTML pré-renderizado de builds anteriores.
  # Isso garante build limpo sem HTML cacheado de versões antigas.
  command = "rm -rf .next && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# CRÍTICO: Protege assets estáticos - deve vir ANTES de qualquer outro redirect
[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

# Headers para cache de assets estáticos (cache longo)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prevenir cache de páginas HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
