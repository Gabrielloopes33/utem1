[build]
  command = "rm -rf .next && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# CRÍTICO: Serve assets estáticos diretamente sem processamento
[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

# Headers para assets estáticos - cache longo (têm hash no nome)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CRÍTICO: NUNCA cachear HTML - força sempre buscar versão nova
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Vary = "*"

# CRÍTICO: NUNCA cachear rotas dinâmicas do app
